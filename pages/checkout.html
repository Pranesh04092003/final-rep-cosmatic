<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Cosmetic Store</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="navbar-container">
      <div class="logo">
        <a href="../index.html">💄 Beauty Cosmetics</a>
      </div>
      <div class="nav-center">
        <a href="products.html" class="nav-link">Shop</a>
        <a href="my-orders.html" class="nav-link">My Orders</a>
      </div>
      <div class="nav-actions">
        <div id="auth-links"></div>
        <a href="cart.html" class="cart-icon">
          🛒 <span id="cart-badge" class="cart-badge">0</span>
        </a>
      </div>
    </div>
  </nav>

    <div class="container">
    <div class="checkout-container">
      <!-- Checkout Form -->
      <div class="checkout-form">
        <h2>Checkout</h2>
        
        <form id="checkout-form">
          <!-- Shipping Information -->
          <div class="form-section">
            <h3>Shipping Information</h3>
            <div class="form-row">
              <div class="form-group">
                <label for="firstName">First Name *</label>
                <input type="text" id="firstName" required>
              </div>
              <div class="form-group">
                <label for="lastName">Last Name *</label>
                <input type="text" id="lastName" required>
              </div>
            </div>
            
            <div class="form-group">
              <label for="address">Address *</label>
              <input type="text" id="address" required>
            </div>
            
            <div class="form-row">
              <div class="form-group">
                <label for="city">City *</label>
                <input type="text" id="city" required>
              </div>
              <div class="form-group">
                <label for="state">State *</label>
                <input type="text" id="state" required>
              </div>
            </div>
            
            <div class="form-row">
              <div class="form-group">
                <label for="zipcode">Zip Code *</label>
                <input type="text" id="zipcode" required>
              </div>
              <div class="form-group">
                <label for="country">Country *</label>
                <input type="text" id="country" value="India" required>
              </div>
            </div>
            
            <div class="form-group">
              <label for="phone">Phone Number *</label>
              <input type="tel" id="phone" required>
            </div>
          </div>

          <!-- Shipping Method -->
          <div class="form-section">
            <h3>Shipping Method</h3>
            <div class="shipping-options">
              <label class="shipping-option">
                <input type="radio" name="shipping" value="standard" checked>
                <div class="option-content">
                  <span class="option-name">Standard Shipping</span>
                  <span class="option-price">₹100 (5-7 days)</span>
                </div>
              </label>
              <label class="shipping-option">
                <input type="radio" name="shipping" value="express">
                <div class="option-content">
                  <span class="option-name">Express Shipping</span>
                  <span class="option-price">₹300 (2-3 days)</span>
                </div>
              </label>
            </div>
          </div>

          <!-- Payment Method -->
          <div class="form-section">
            <h3>Payment Method</h3>
            <div class="payment-options">
              <label class="payment-option">
                <input type="radio" name="payment" value="upi" checked>
                <div class="option-content">
                  <span class="option-name">📱 UPI</span>
                </div>
              </label>
            </div>

            <!-- UPI Details -->
            <div id="upi-details" class="payment-details">
              <div class="form-group">
                <label for="upiId">UPI ID *</label>
                <input type="text" id="upiId" placeholder="yourname@upi" required>
              </div>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg">Place Order</button>
        </form>
      </div>

      <!-- Order Summary -->
      <div class="order-summary-card">
        <h3>Order Summary</h3>
        <div id="checkout-items" class="checkout-items">
          <!-- Cart items will be loaded here -->
        </div>
        
        <div class="summary-totals">
          <div class="summary-row">
            <span>Subtotal:</span>
            <span id="subtotal">₹0</span>
          </div>
          <div class="summary-row">
            <span>Shipping:</span>
            <span id="shipping-cost">₹100</span>
          </div>
          <div class="summary-row">
            <span>Tax (10%):</span>
            <span id="tax">₹0</span>
          </div>
          <div class="summary-row total">
            <span>Total:</span>
            <span id="total">₹0</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/orders.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    // Initialize cart as global variable
    let cart = [];
    
    function initCheckout() {
      try {
        // Get cart from cartManager
        cart = cartManager.getCart() || [];
      
        // Check if cart is valid and has items
        if (!cart || !Array.isArray(cart) || cart.length === 0) {
          window.location.href = 'cart.html';
          return;
        }

        // Display items and totals
        displayCheckoutItems();
        calculateTotals();

        // Auto-fill user info if logged in
        const user = authManager.currentUser;
        if (user && user.name) {
          const nameParts = user.name.split(' ');
          document.getElementById('firstName').value = nameParts[0] || '';
          document.getElementById('lastName').value = nameParts.slice(1).join(' ') || '';
        }
      } catch (error) {
        console.error('Error initializing checkout:', error);
        window.location.href = 'cart.html';
      }
    }

    // Display cart items
    function displayCheckoutItems() {
      const container = document.getElementById('checkout-items');
      if (!container) return;
      
      container.innerHTML = cart.map(item => `
        <div class="checkout-item">
          <img src="${item.image}" alt="${item.name}">
          <div class="checkout-item-info">
            <h4>${item.name}</h4>
            <p>Qty: ${item.quantity}</p>
          </div>
          <span class="checkout-item-price">${formatPrice(item.price * item.quantity)}</span>
        </div>
      `).join('');
    }

    // Calculate totals
    function calculateTotals() {
      if (!cart || !Array.isArray(cart) || cart.length === 0) return;
      const subtotal = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
      const shippingMethod = document.querySelector('input[name="shipping"]:checked').value;
      const shipping = shippingMethod === 'express' ? 300 : 100;
      const tax = Math.round(subtotal * 0.1);
      const total = subtotal + shipping + tax;

      document.getElementById('subtotal').textContent = formatPrice(subtotal);
      document.getElementById('shipping-cost').textContent = formatPrice(shipping);
      document.getElementById('tax').textContent = formatPrice(tax);
      document.getElementById('total').textContent = formatPrice(total);
    }

    // Update totals when shipping method changes
    document.querySelectorAll('input[name="shipping"]').forEach(radio => {
      radio.addEventListener('change', calculateTotals);
    });

    // Handle form submission
    document.getElementById('checkout-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      e.stopPropagation();

      const user = authManager.currentUser;
      if (!user) {
        showNotification('Please login to place order', 'error');
        setTimeout(() => window.location.href = 'login.html', 1000);
        return;
      }

      const paymentMethod = 'upi';

      // Validate UPI ID
      const upiId = document.getElementById('upiId').value;
      if (!upiId) {
        showNotification('Please enter UPI ID', 'error');
        return;
      }

      const userDetails = {
        id: user.id?.toString(),
        email: user.email,
        paymentMethod: paymentMethod,
        shippingMethod: document.querySelector('input[name="shipping"]:checked').value,
        shippingAddress: {
          firstName: document.getElementById('firstName').value,
          lastName: document.getElementById('lastName').value,
          address: document.getElementById('address').value,
          city: document.getElementById('city').value,
          state: document.getElementById('state').value,
          zipcode: document.getElementById('zipcode').value,
          country: document.getElementById('country').value,
          phone: document.getElementById('phone').value,
        }
      };

      // Validate cart has items before submitting
      if (!cart || !Array.isArray(cart) || cart.length === 0) {
        showNotification('Cart is empty. Please add items before placing order.', 'error');
        window.location.href = 'cart.html';
        return;
      }

      try {
        const result = await orderManager.createOrder(userDetails, cart);
        console.log('Order created, redirecting to:', result.id);
        cartManager.clear();
        updateCartBadge();
        
        // Immediate redirect to confirmation page
        window.location.href = `order-confirmation.html?id=${result.id}`;
      } catch (err) {
        console.error('Order creation failed:', err);
        showNotification(err.message || 'Failed to place order', 'error');
      }
    });

    // Run initialization when page loads
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initCheckout);
    } else {
      initCheckout();
    }
  </script>
</body>
</html>
