<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details - Cosmetic Store</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="navbar-container">
      <div class="logo">
        <a href="../index.html">💄 Beauty Cosmetics</a>
      </div>
      <div class="nav-center">
        <a href="products.html" class="nav-link">Shop</a>
        <a href="my-orders.html" class="nav-link">My Orders</a>
      </div>
      <div class="nav-right" id="auth-links"></div>
      <a href="cart.html" class="cart-link">
        🛒 Cart <span id="cart-badge" class="cart-badge">0</span>
      </a>
    </div>
  </nav>

  <div class="container">
    <div class="breadcrumb">
      <a href="products.html">Products</a> / <span id="breadcrumb-name"></span>
    </div>

    <div class="product-details">
      <div class="details-image">
        <img id="product-image" src="" alt="">
      </div>
      <div class="details-info">
        <h1 id="product-name"></h1>
        <p id="product-category" class="product-category"></p>
        <div class="product-rating" id="product-rating"></div>
        <p id="product-description" class="product-description"></p>
        
        <div class="product-price-section">
          <p class="product-price" id="product-price"></p>
          <div class="product-stock">
            <span class="stock-badge">In Stock</span>
          </div>
        </div>

        <div class="product-actions">
          <div class="quantity-selector">
            <label for="quantity">Quantity:</label>
            <div class="qty-control">
              <button onclick="decreaseQty()">-</button>
              <input type="number" id="quantity" min="1" value="1">
              <button onclick="increaseQty()">+</button>
            </div>
          </div>
          <button class="btn btn-primary btn-lg" onclick="addToCartDetails()">Add to Cart</button>
          <button class="btn btn-secondary btn-lg" onclick="addToWishlist()">❤️ Wishlist</button>
        </div>

        <div class="product-features">
          <h3>Features</h3>
          <ul>
            <li>Premium quality cosmetics</li>
            <li>Safe for all skin types</li>
            <li>Long-lasting formula</li>
            <li>Dermatologist tested</li>
          </ul>
        </div>
      </div>
    </div>

    <!-- Reviews Section -->
    <div class="reviews-section">
      <h2>Customer Reviews</h2>
      <div id="reviews-container" class="reviews-list">
        <!-- Reviews will be loaded here -->
      </div>
      <div class="add-review">
        <h3>Write a Review</h3>
        <form id="review-form">
          <div class="form-group">
            <label for="review-name">Name</label>
            <input type="text" id="review-name" required>
          </div>
          <div class="form-group">
            <label for="review-rating">Rating</label>
            <select id="review-rating" required>
              <option value="">Select rating</option>
              <option value="5">5 Stars</option>
              <option value="4">4 Stars</option>
              <option value="3">3 Stars</option>
              <option value="2">2 Stars</option>
              <option value="1">1 Star</option>
            </select>
          </div>
          <div class="form-group">
            <label for="review-text">Review</label>
            <textarea id="review-text" rows="4" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Submit Review</button>
        </form>
      </div>
    </div>

    <!-- Related Products -->
    <div class="related-products">
      <h2>Related Products</h2>
      <div id="related-products-grid" class="products-grid">
        <!-- Related products will be loaded here -->
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/orders.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    const productId = parseInt(new URLSearchParams(window.location.search).get('id'));
    let product = null;
    let allProducts = [];

    async function loadProduct() {
      try {
        product = await window.api.fetchProduct(productId);
        allProducts = await window.api.fetchProducts();
        if (!product) {
          document.body.innerHTML = '<div class="container"><h1>Product not found</h1></div>';
          return;
        }
        renderProduct();
        loadReviews();
        loadRelatedProducts();
      } catch (err) {
        document.body.innerHTML = `<div class="container"><h1>${err.message || 'Product not found'}</h1></div>`;
      }
    }

    function renderProduct() {
      document.getElementById('product-name').textContent = product.name;
      document.getElementById('breadcrumb-name').textContent = product.name;
      document.getElementById('product-category').textContent = product.category;
      document.getElementById('product-description').textContent = product.description;
      document.getElementById('product-image').src = product.image;
      document.getElementById('product-price').textContent = formatPrice(product.price);
      document.getElementById('product-rating').innerHTML = `${'⭐'.repeat(Math.floor(product.rating))} (${product.rating})`;
    }

    function loadReviews() {
      const reviewsContainer = document.getElementById('reviews-container');
      if (!product.reviews || product.reviews.length === 0) {
        reviewsContainer.innerHTML = '<p>No reviews yet. Be the first to review!</p>';
      } else {
        reviewsContainer.innerHTML = product.reviews.map(review => `
          <div class="review-item">
            <div class="review-header">
              <strong>${review.author}</strong>
              <span class="review-rating">${'⭐'.repeat(review.rating)}</span>
            </div>
            <p>${review.text}</p>
          </div>
        `).join('');
      }
    }

    function loadRelatedProducts() {
      const related = allProducts.filter(p => p.category === product.category && p.id !== product.id).slice(0, 4);
      const grid = document.getElementById('related-products-grid');
      grid.innerHTML = related.map(p => `
        <div class="product-card">
          <div class="product-image">
            <img src="${p.image}" alt="${p.name}">
            <div class="product-overlay">
              <a href="product-details.html?id=${p.id}" class="btn btn-small btn-primary">View Details</a>
            </div>
          </div>
          <div class="product-info">
            <h3 class="product-name">${p.name}</h3>
            <p class="product-price">${formatPrice(p.price)}</p>
          </div>
        </div>
      `).join('');
    }

    function decreaseQty() {
      const qty = document.getElementById('quantity');
      if (qty.value > 1) qty.value--;
    }

    function increaseQty() {
      const qty = document.getElementById('quantity');
      qty.value++;
    }

    function addToCartDetails() {
      const qty = parseInt(document.getElementById('quantity').value);
      cartManager.addItem(product, qty);
      showNotification(`${product.name} added to cart!`);
      updateCartBadge();
    }

    function addToWishlist() {
      let wishlist = JSON.parse(localStorage.getItem('cosmetic_wishlist') || '[]');
      if (wishlist.find(p => p.id === product.id)) {
        showNotification('Already in wishlist', 'info');
      } else {
        wishlist.push(product);
        localStorage.setItem('cosmetic_wishlist', JSON.stringify(wishlist));
        showNotification('Added to wishlist!');
      }
    }

    document.getElementById('review-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('review-name').value;
      const rating = document.getElementById('review-rating').value;
      const text = document.getElementById('review-text').value;

      try {
        await window.api.addReviewApi(product.id, { author: name, rating: parseInt(rating), text });
        product = await window.api.fetchProduct(product.id);
        document.getElementById('review-form').reset();
        loadReviews();
        showNotification('Review submitted successfully!');
      } catch (err) {
        showNotification(err.message || 'Failed to submit review', 'error');
      }
    });

    // Make functions global for inline handlers
    window.decreaseQty = decreaseQty;
    window.increaseQty = increaseQty;
    window.addToCartDetails = addToCartDetails;
    window.addToWishlist = addToWishlist;

    loadProduct();
  </script>
</body>
</html>
