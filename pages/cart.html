<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - Cosmetic Store</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="navbar-container">
      <div class="logo">
        <a href="../index.html">💄 Beauty Cosmetics</a>
      </div>
      <div class="nav-center">
        <a href="products.html" class="nav-link">Shop</a>
        <a href="my-orders.html" class="nav-link">My Orders</a>
      </div>
      <div class="nav-right" id="auth-links"></div>
      <a href="cart.html" class="cart-link active">
        🛒 Cart <span id="cart-badge" class="cart-badge">0</span>
      </a>
    </div>
  </nav>

  <div class="container">
    <h1>Shopping Cart</h1>
    
    <div class="cart-container">
      <div class="cart-items">
        <table class="cart-table">
          <thead>
            <tr>
              <th>Product</th>
              <th>Price</th>
              <th>Quantity</th>
              <th>Total</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="cart-items-body">
            <!-- Cart items will be loaded here -->
          </tbody>
        </table>
        <div id="empty-cart-message" class="empty-cart">
          <p>Your cart is empty</p>
          <a href="products.html" class="btn btn-primary">Continue Shopping</a>
        </div>
      </div>

      <div class="cart-summary">
        <h2>Order Summary</h2>
        <div class="summary-row">
          <span>Subtotal:</span>
          <span id="subtotal">₹0</span>
        </div>
        <div class="summary-row">
          <span>Shipping:</span>
          <span id="shipping">₹0</span>
        </div>
        <div class="summary-row">
          <span>Tax (10%):</span>
          <span id="tax">₹0</span>
        </div>
        <div class="summary-row total">
          <span>Total:</span>
          <span id="total">₹0</span>
        </div>
        
        <button class="btn btn-primary btn-block" onclick="proceedToCheckout()">Proceed to Checkout</button>
        <a href="products.html" class="btn btn-secondary btn-block">Continue Shopping</a>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/orders.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    function loadCart() {
      const cart = cartManager.getCart();
      const tableBody = document.getElementById('cart-items-body');
      const emptyMessage = document.getElementById('empty-cart-message');

      if (cart.length === 0) {
        tableBody.parentElement.style.display = 'none';
        emptyMessage.style.display = 'block';
        updateSummary();
        return;
      }

      tableBody.parentElement.style.display = 'table';
      emptyMessage.style.display = 'none';

      tableBody.innerHTML = cart.map(item => `
        <tr>
          <td>
            <div class="cart-item-info">
              <img src="${item.image}" alt="${item.name}" class="cart-item-image">
              <div>
                <h4>${item.name}</h4>
                <p>${item.category}</p>
              </div>
            </div>
          </td>
          <td>${formatPrice(item.price)}</td>
          <td>
            <div class="qty-control">
              <button onclick="updateQty(${item.id}, ${item.quantity - 1})">-</button>
              <input type="number" value="${item.quantity}" readonly>
              <button onclick="updateQty(${item.id}, ${item.quantity + 1})">+</button>
            </div>
          </td>
          <td>${formatPrice(item.price * item.quantity)}</td>
          <td>
            <button class="btn btn-small btn-danger" onclick="removeFromCart(${item.id})">Remove</button>
          </td>
        </tr>
      `).join('');

      updateSummary();
    }

    function updateQty(productId, newQty) {
      if (newQty < 1) {
        removeFromCart(productId);
      } else {
        cartManager.updateQuantity(productId, newQty);
        loadCart();
        updateCartBadge();
      }
    }

    function removeFromCart(productId) {
      cartManager.removeItem(productId);
      loadCart();
      updateCartBadge();
      showNotification('Item removed from cart');
    }

    function updateSummary() {
      const subtotal = cartManager.getTotal();
      const shipping = subtotal > 0 ? 100 : 0;
      const tax = Math.round(subtotal * 0.1);
      const total = subtotal + shipping + tax;

      document.getElementById('subtotal').textContent = formatPrice(subtotal);
      document.getElementById('shipping').textContent = formatPrice(shipping);
      document.getElementById('tax').textContent = formatPrice(tax);
      document.getElementById('total').textContent = formatPrice(total);
    }

    function proceedToCheckout() {
      if (cartManager.getCart().length === 0) {
        showNotification('Cart is empty', 'error');
        return;
      }

      if (!authManager.isLoggedIn()) {
        showNotification('Please login to proceed', 'info');
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1500);
        return;
      }

      window.location.href = 'checkout.html';
    }

    window.updateQty = updateQty;
    window.removeFromCart = removeFromCart;
    window.proceedToCheckout = proceedToCheckout;

    loadCart();
  </script>
</body>
</html>
